name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-public-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify public release surface
        run: python3 scripts/verify_public_release.py

